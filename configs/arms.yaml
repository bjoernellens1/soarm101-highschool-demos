# Self-contained workshop hardware registry.
#
# Why YAML instead of only .env?
# - One PC may control several SO-ARM101 stations.
# - Every leader/follower/camera gets a stable human-readable name.
# - The web launcher and shell scripts can select a station via --rig or RIG=.
#
# Recommended port style:
#   1. Best: custom udev symlinks generated by tools/generate_udev_rules.py
#      e.g. /dev/so101/rig01_follower
#   2. Good: /dev/serial/by-id/... symlinks
#   3. Avoid for workshops: /dev/ttyACM0, /dev/ttyACM1 because ordering can change.

project:
  default_hf_user: your-hf-user
  default_dataset_prefix: hs-so101
  calibration_backup_dir: calibration_backups

rigs:
  rig01:
    label: "Station 1 - front table"
    task_text: "Pick up the red cube and place it in the left bin"
    follower:
      type: so101_follower
      id: hs_rig01_follower
      port: /dev/so101/rig01_follower
      serial_hint: "usb-1a86_USB_Single_Serial_5AB9068906-if00"
    leader:
      type: so101_leader
      id: hs_rig01_leader
      port: /dev/so101/rig01_leader
      serial_hint: "usb-1a86_USB_Single_Serial_5AB9068765-if00"
    cameras:
      front:
        type: opencv
        index_or_path: 0
        width: 640
        height: 480
        fps: 30

  rig02:
    label: "Station 2 - optional second arm pair"
    task_text: "Pick up the blue cube and place it in the right bin"
    follower:
      type: so101_follower
      id: hs_rig02_follower
      port: /dev/so101/rig02_follower
      serial_hint: "paste USB serial/by-id fragment here"
    leader:
      type: so101_leader
      id: hs_rig02_leader
      port: /dev/so101/rig02_leader
      serial_hint: "paste USB serial/by-id fragment here"
    cameras:
      front:
        type: opencv
        index_or_path: 1
        width: 640
        height: 480
        fps: 30

bimanual_demos:
  demo01:
    label: "Two-arm foam cube pass"
    left_rig: rig01
    right_rig: rig02
    safety_note: "Teacher-operated only for first sessions. Keep arm workspaces separated."
